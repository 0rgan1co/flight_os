function log(msg, type) {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = type || '';
  span.textContent = msg + '\n';
  el.appendChild(span);
}

async function upsert(key, value) {
  const { error } = await sb.from('data_store').upsert({ key, value: JSON.stringify(value) });
  if (error) { log('✗ ' + key + ': ' + error.message, 'err'); return false; }
  log('✓ ' + key + ' guardado correctamente', 'ok');
  return true;
}

async function runLoad() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Cargando...';
  document.getElementById('log').innerHTML = '';
  log('Conectando a Supabase...\n');
  const ok1 = await upsert('flightos_n1', n1);
  const ok2 = await upsert('flightos_n2', n2);
  const ok3 = await upsert('flightos_n3', n3);
  if (ok1 && ok2 && ok3) {
    log('\n¡Listo! Abrí el dashboard y recargá la página.', 'done');
    btn.textContent = '✓ Datos cargados';
  } else {
    log('\nAlgo falló. Revisá los errores arriba.', 'err');
    btn.disabled = false;
    btn.textContent = 'Reintentar';
  }
}
